{% extends "base.html" %}
{% block nav_extra %}<div class="client-name">{{ user.name }}</div>{% endblock %}
{% block content %}
<div class="page">
  <div class="page-title">¿Qué activo está restringido?</div>
  <div class="page-sub">Selecciona los activos afectados y pulsa <strong>Notificar</strong>. El equipo recibirá el aviso de inmediato.</div>
  <div class="structure-label">Activos</div>
  <form method="post" action="/tickets">
    <div class="asset-list">
      {% for asset in assets %}
      <label class="asset-item" for="asset-{{ asset.external_id }}">
        <input type="checkbox" name="asset_ids" id="asset-{{ asset.external_id }}" value="{{ asset.external_id }}" onchange="onSelect(this)" />
        <div class="asset-icon {{ asset.type }}"><i class="ti {{ asset.icon }}"></i></div>
        <div class="asset-text">
          <div class="asset-name">{{ asset.label }}</div>
          <div class="asset-type">{{ type_label(asset.type) }} · {{ asset.external_id }}</div>
        </div>
        <div class="check-circle"><i class="ti ti-check"></i></div>
      </label>
      {% endfor %}
    </div>
    <div class="selection-info" id="sel-info"></div>
    <button class="btn-notify" type="submit" id="btn-notify" disabled><i class="ti ti-send"></i> Notificar incidencia</button>
  </form>
</div>
<script>
function onSelect(input) {
  input.closest('.asset-item').classList.toggle('selected', input.checked);
  const names = Array.from(document.querySelectorAll('.asset-item input:checked'))
    .map(i => i.closest('.asset-item').querySelector('.asset-name').textContent);
  const info = document.getElementById('sel-info');
  const btn = document.getElementById('btn-notify');
  if (names.length === 0) {
    info.innerHTML = '';
    btn.disabled = true;
  } else {
    info.innerHTML = 'Vas a notificar: <span>' + names.join(', ') + '</span>';
    btn.disabled = false;
  }
}
</script>
{% endblock %}
